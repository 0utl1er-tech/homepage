</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/0utl1er-design-system-683794eb-2b63-4ee5-897d-70dea005c1be/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/0utl1er-design-system-683794eb-2b63-4ee5-897d-70dea005c1be/tokens/colors.css">
  <link rel="stylesheet" href="_ds/0utl1er-design-system-683794eb-2b63-4ee5-897d-70dea005c1be/tokens/typography.css">
  <link rel="stylesheet" href="_ds/0utl1er-design-system-683794eb-2b63-4ee5-897d-70dea005c1be/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/0utl1er-design-system-683794eb-2b63-4ee5-897d-70dea005c1be/tokens/elevation.css">
  <link rel="stylesheet" href="_ds/0utl1er-design-system-683794eb-2b63-4ee5-897d-70dea005c1be/tokens/base.css">
  <link rel="stylesheet" href="_ds/0utl1er-design-system-683794eb-2b63-4ee5-897d-70dea005c1be/styles.css">
  <script src="_ds/0utl1er-design-system-683794eb-2b63-4ee5-897d-70dea005c1be/_ds_bundle.js"></script>
  <style>
    body { margin: 0; background: var(--bg-void); }
    .o-arrow { font-family: var(--font-mono); color: var(--accent); text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; transition: gap .15s ease; }
    .o-arrow:hover { gap: 12px; }
    .o-prose { font-size: 16px; line-height: 1.95; color: var(--text-secondary); }
    .o-prose h2 { font-size: 24px; font-weight: 800; color: var(--text-primary); letter-spacing: -.02em; margin: 40px 0 14px; }
    .o-prose h3 { font-size: 19px; font-weight: 700; color: var(--text-primary); margin: 32px 0 12px; }
    .o-prose h4 { font-size: 16px; font-weight: 700; color: var(--text-primary); margin: 24px 0 10px; }
    .o-prose p { margin: 0 0 18px; }
    .o-prose a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--border-default); }
    .o-prose ul, .o-prose ol { margin: 0 0 18px; padding-left: 22px; }
    .o-prose li { margin: 0 0 8px; }
    .o-prose blockquote { margin: 0 0 18px; padding: 12px 20px; border-left: 3px solid var(--accent); color: var(--text-primary); background: var(--surface-1); border-radius: 0 8px 8px 0; }
    .o-prose code { font-family: var(--font-mono); font-size: .9em; background: var(--surface-2); padding: 2px 6px; border-radius: 4px; color: var(--text-primary); }
    .o-prose img { max-width: 100%; height: auto; border-radius: 10px; margin: 8px 0 20px; border: 1px solid var(--border-default); }
    .o-prose hr { border: none; border-top: 1px solid var(--border-default); margin: 28px 0; }
    .o-prose strong { color: var(--text-primary); font-weight: 700; }
  </style>
</helmet>
<div style="background: var(--bg-void); color: var(--text-primary); font-family: var(--font-sans); min-height: 100vh;">

  <dc-import name="SiteNav" active="product" hint-size="100%,66px"></dc-import>

  <sc-if value="{{ loading }}" hint-placeholder-val="{{ true }}">
    <div style="max-width: 820px; margin: 0 auto; padding: 80px 48px;">
      <div style="height: 16px; width: 180px; background: var(--surface-1); border-radius: 6px; margin-bottom: 28px; opacity: .5;"></div>
      <div style="height: 44px; width: 80%; background: var(--surface-1); border-radius: 8px; margin-bottom: 16px; opacity: .5;"></div>
      <div style="height: 320px; background: var(--surface-1); border-radius: 12px; opacity: .4;"></div>
    </div>
  </sc-if>

  <sc-if value="{{ notFound }}" hint-placeholder-val="{{ false }}">
    <div style="max-width: 820px; margin: 0 auto; padding: 120px 48px; text-align: center;">
      <div style="font-family: var(--font-mono); font-size: 64px; font-weight: 700; color: transparent; -webkit-text-stroke: 1.5px var(--accent); letter-spacing: -.04em; margin-bottom: 20px;">404</div>
      <h1 style="font-size: 26px; font-weight: 800; margin: 0 0 14px;">記事が見つかりませんでした</h1>
      <p style="font-size: 15px; color: var(--text-secondary); margin: 0 0 28px;">URLが正しいか、記事が公開されているかをご確認ください。</p>
      <a href="プロダクト.dc.html" class="o-arrow" style="justify-content: center;">← 一覧へ戻る</a>
    </div>
  </sc-if>

  <sc-if value="{{ ready }}" hint-placeholder-val="{{ false }}">
    <article>
      <header style="border-bottom: 1px solid var(--border-default);">
        <div style="max-width: 820px; margin: 0 auto; padding: 48px 48px 40px;">
          <a href="プロダクト.dc.html" class="o-arrow" style="margin-bottom: 28px;">← サービス一覧</a>
          <div style="display: flex; align-items: center; gap: 14px; margin: 22px 0 18px;">
            <span style="font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: .08em; color: var(--accent); text-transform: uppercase;">{{ category }}</span>
            <span style="width: 3px; height: 3px; border-radius: 50%; background: var(--text-muted);"></span>
            <span style="font-family: var(--font-mono); font-size: 12px; color: var(--text-muted);">{{ dateLabel }}</span>
          </div>
          <h1 style="font-size: 38px; line-height: 1.3; font-weight: 900; letter-spacing: -.03em; margin: 0;">{{ title }}</h1>
        </div>
      </header>

      <sc-if value="{{ hasCover }}" hint-placeholder-val="{{ false }}">
        <div style="max-width: 980px; margin: 0 auto; padding: 36px 48px 0;">{{ coverEl }}</div>
      </sc-if>

      <div style="max-width: 820px; margin: 0 auto; padding: 48px 48px 8px;">
        {{ body }}
      </div>

      <div style="max-width: 820px; margin: 0 auto; padding: 24px 48px 0;">
        <div style="border-top: 1px solid var(--border-default); padding-top: 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;">
          <a href="プロダクト.dc.html" class="o-arrow">← 他の記事を見る</a>
          <a href="お問い合わせ.dc.html" style="text-decoration: none;"><x-import component-from-global-scope="Ds0UTL1ERDesignSystem_683794.Button" variant="secondary" size="md" hint-size="auto,38px">この件について相談する</x-import></a>
        </div>
      </div>
    </article>
  </sc-if>

  <section style="position: relative; overflow: hidden; background: var(--surface-panel); border-top: 1px solid var(--border-default); margin-top: 72px;">
    <div aria-hidden="true" style="position: absolute; bottom: -34px; left: -10px; font-family: var(--font-mono); font-size: 120px; font-weight: 700; color: var(--accent); opacity: .05; user-select: none; pointer-events: none;">01</div>
    <div style="position: relative; max-width: 1200px; margin: 0 auto; padding: 80px 48px;">
      <h2 style="font-size: 30px; font-weight: 800; letter-spacing: -.02em; margin: 0 0 14px;">最良のサービスを、一緒に。</h2>
      <div style="display: flex; gap: 16px; align-items: center;">
        <a href="お問い合わせ.dc.html" style="text-decoration: none;"><x-import component-from-global-scope="Ds0UTL1ERDesignSystem_683794.Button" variant="primary" size="lg" hint-size="auto,44px">お問い合わせ →</x-import></a>
        <span style="font-family: var(--font-mono); font-size: 14px; color: var(--text-secondary);">info@0utl1er.tech</span>
      </div>
    </div>
  </section>

  <dc-import name="SiteFooter" hint-size="100%,260px"></dc-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { item: null, loading: true, notFound: false, usingSample: false };
  async componentDidMount() {
    const slug = new URLSearchParams(window.location.search).get("slug") || "";
    let m;
    try {
      m = await import("./strapi.js");
    } catch (e) {
      this.setState({ loading: false, notFound: true });
      return;
    }
    try {
      const item = await m.fetchBySlug(slug);
      if (item) {
        this.setState({ item, loading: false });
        return;
      }
      throw new Error("nf");
    } catch (e) {
      const s = m.sampleDetail(slug);
      if (s) this.setState({ item: s, loading: false, usingSample: true });
      else this.setState({ loading: false, notFound: true });
    }
  }
  renderVals() {
    const it = this.state.item || {};
    return {
      loading: this.state.loading,
      notFound: this.state.notFound,
      ready: !this.state.loading && !this.state.notFound && !!this.state.item,
      title: it.title || "",
      category: it.category || "",
      dateLabel: it.dateLabel || "",
      hasCover: !!it.hasCover,
      coverEl: it.cover
        ? React.createElement("img", {
            src: it.cover,
            alt: "",
            style: { width: "100%", aspectRatio: "16 / 9", objectFit: "cover", borderRadius: "14px", border: "1px solid var(--border-default)", display: "block" },
          })
        : null,
      body: this.state.item
        ? React.createElement("div", {
            className: "o-prose",
            dangerouslySetInnerHTML: { __html: it.bodyHtml || "" },
          })
        : null,
    };
  }
}
</script>
</body>
</html>
